trigger:
  batch: true
  branches:
    exclude:
      - pre-commit/*
pr:
  - main
  - develop

jobs:
  - job: Linux
    strategy:
      matrix:
        ubuntuDefault:
          containerImage: "helics/buildenv:ubuntu22.04-default-builder"
          test_config: "ci"
          use_mpi: "true"
          encrypted: "true"
          helics_debug_cleanup: ""
        gcc11:
          containerImage: "helics/buildenv:gcc11-builder"
          test_config: "ci"
          use_mpi: "true"
          encrypted: "true"
          helics_debug_cleanup: ""
        clang15:
          containerImage: "helics/buildenv:clang15-builder"
          test_config: "ci"
          use_mpi: ""
          encrypted: ""
          helics_debug_cleanup: ""
        clang18:
          containerImage: "helics/buildenv:clang18-builder"
          test_config: "ci"
          use_mpi: ""
          encrypted: ""
          helics_debug_cleanup: "0"

    pool:
      vmImage: "ubuntu-latest"
    container: $[ variables['containerImage'] ]
    timeoutInMinutes: 60

    steps:
      - bash: |
          unset VCPKG_ROOT
          source scripts/setup-helics-ci-options.sh
          mkdir -p build && cd build
          ../scripts/ci-build.sh
        env:
          MAKEFLAGS: "-j 4"
          CMAKE_GENERATOR: "Unix Makefiles"
          USE_SWIG: "true"
          USE_MPI: $[variables['use_mpi']]
          ENCRYPTED: $[variables['encrypted']]
          ZMQ_SUBPROJECT: $[variables['zmq_subproject']]
          ZMQ_FORCE_SUBPROJECT: $[variables['zmq_subproject']]
        displayName: "Build HELICS"

      - bash: ../scripts/run-ci-tests.sh "$TEST_CONFIG"
        env:
          TEST_CONFIG: $[variables['test_config']]
          HELICS_DEBUG_CLEANUP: $[variables['helics_debug_cleanup']]
        workingDirectory: "build"
        displayName: "Test HELICS"

  - job: macOS
    strategy:
      matrix:
        XCode-latest:
          test_config: "ci"
          vmImage: "macOS-15"
        XCode-oldest:
          test_config: "ci"
          vmImage: "macOS-14"
    pool:
      vmImage: $[ variables['vmImage'] ]
    timeoutInMinutes: 60

    steps:
      - bash: sudo xcode-select --switch "${XCODE_PATH}/Contents/Developer"
        env:
          XCODE_PATH: $[variables['xcode_path']]
        displayName: "Set XCode Path"
        condition: ne(variables['xcode_path'],'')
      - bash: |
          brew install swig zeromq boost
        displayName: "Install dependencies"
      - bash: |
          unset VCPKG_ROOT
          source scripts/setup-helics-ci-options.sh
          mkdir -p build && cd build
          ../scripts/ci-build.sh
        env:
          MAKEFLAGS: "-j 4"
          CMAKE_GENERATOR: "Unix Makefiles"
          USE_SWIG: "true"
        displayName: "Build HELICS"

      - bash: ../scripts/run-ci-tests.sh "$TEST_CONFIG"
        env:
          TEST_CONFIG: $[variables['test_config']]
        workingDirectory: "build"
        displayName: "Test HELICS"

  - job: Windows
    strategy:
      matrix:
        VS2022-32bit:
          imageName: "windows-2022"
          langArch: "x86"
          vsArch: "Win32"
          extraFlags: "-DHELICS_DISABLE_WEBSERVER=ON"
          buildExamples: "ON"
          enablePackageBuild: "ON"
          runPackaging: "true"
        VS2026-64bit:
          imageName: "windows-2025-vs2026"
          langArch: "x64"
          vsArch: "x64"
          extraFlags: "-DCMAKE_CXX_STANDARD=23 -DHELICS_DISABLE_C_SHARED_LIB=ON -DHELICS_DISABLE_WEBSERVER=ON -DHELICS_BUILD_APP_EXECUTABLES=OFF -DHELICS_DISABLE_ASIO=ON"
          buildExamples: "OFF"
          enablePackageBuild: "OFF"
          runPackaging: "false"
        VS2022-64bit:
          imageName: "windows-2022"
          langArch: "x64"
          vsArch: "x64"
          extraFlags: "-DCMAKE_CXX_STANDARD=20"
          buildExamples: "ON"
          enablePackageBuild: "ON"
          runPackaging: "true"

    pool:
      vmImage: $(imageName)
    variables:
      BOOST_ROOT: $(Pipeline.Workspace)/ci-libs/boost
      BOOST_URL: https://sourceforge.net/projects/boost/files/boost/1.74.0/boost_1_74_0.tar.bz2/download

    steps:
      # -----------------------
      # Install dependencies
      # -----------------------
      - task: Cache@2
        inputs:
          path: $(BOOST_ROOT)
          key: boost
          cacheHitVar: BOOST_CACHE_RESTORED
        displayName: Restore Boost cache
      - bash: |
          cd $(mktemp -d)
          curl --location --output "download.tar.bz2" "$BOOST_URL"
          tar xfj "download.tar.bz2"
          mkdir -p "$BOOST_ROOT"
          cp -r boost_*/* "$BOOST_ROOT"
        condition: ne(variables.BOOST_CACHE_RESTORED, 'true')
        displayName: Install Boost

      - bash: swig -version
        condition: eq( variables['Agent.OS'], 'Windows_NT' )
        displayName: Show swig version

      # -----------------------
      # Configure HELICS
      # -----------------------
      - bash: |
          echo "BOOST_ROOT=$BOOST_ROOT"
          echo "NUMBER_OF_PROCESSORS=$NUMBER_OF_PROCESSORS"
          env
        displayName: Show environment info
      - task: CMake@1
        inputs:
          cmakeArgs: -A $(vsArch) -DHELICS_ENABLE_SWIG=ON -DHELICS_BUILD_CXX_SHARED_LIB=ON -DHELICS_ENABLE_PACKAGE_BUILD=$(enablePackageBuild) -DHELICS_BUILD_TESTS=ON -DHELICS_BUILD_EXAMPLES=$(buildExamples) -DHELICS_DISABLE_VCPKG=ON -DHELICS_EMBEDDED_DEBUG_INFO=external $(extraFlags) ..
        displayName: "Configure HELICS"
        condition: eq( variables['Agent.OS'], 'Windows_NT' )

      #  - task: CMake@1
      #    inputs:
      #      cmakeArgs: -DHELICS_BUILD_JAVA_INTERFACE=ON .
      #    displayName: 'Configure Java interface'
      #    condition: eq( variables['langArch'], 'x64' )

      # -----------------------
      # Build HELICS
      # -----------------------
      - bash: |
          export CMAKE_BUILD_PARALLEL_LEVEL="${NUMBER_OF_PROCESSORS:-8}"
          cmake --build . --parallel "$CMAKE_BUILD_PARALLEL_LEVEL" --config Release
        displayName: "Build HELICS"
        workingDirectory: build

      # -----------------------
      # Package HELICS
      # -----------------------
      - bash: |
          cpack_dir="$(which cmake)"
          cpack_dir="${cpack_dir%/cmake}"
          "${cpack_dir}/cpack" -G "NSIS" -C Release -B "$PWD/installer-output"
        displayName: "Package HELICS"
        workingDirectory: build
        condition: eq(variables['runPackaging'], 'true')

      - task: CopyFiles@2
        inputs:
          sourceFolder: "$(Build.SourcesDirectory)/build/installer-output"
          contents: "*.exe"
          TargetFolder: "$(Build.ArtifactStagingDirectory)"
        condition: eq(variables['runPackaging'], 'true')

      - task: PublishBuildArtifacts@1
        inputs:
          pathtoPublish: "$(Build.ArtifactStagingDirectory)"
          artifactName: installer
        condition: eq(variables['runPackaging'], 'true')

      # -----------------------
      # Test HELICS
      # -----------------------
      - bash: ctest --output-on-failure --timeout 440 -C Release -L "Continuous"
        displayName: "Test HELICS"
        workingDirectory: build

      # Packaging tests
      - bash: ctest --output-on-failure --timeout 200 -C Release -L "PackagingFast"
        displayName: "Test HELICS packaging"
        workingDirectory: build
        condition: eq(variables['runPackaging'], 'true')

      # For debugging, can get build folder contents by adding PublishBuildArtifacts task and set pathtoPublish: '$(Build.SourcesDirectory)/build'
