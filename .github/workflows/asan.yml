name: Address Sanitizer

on:
  workflow_dispatch:
  schedule:
    - cron: '0 8 * * *'

permissions:
  contents: read

concurrency:
  group: asan-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  asan:
    name: ASan
    runs-on: ubuntu-latest
    container:
      image: helics/buildenv:sanitizers-22
    env:
      ASAN_OPTIONS: alloc_dealloc_mismatch=0

    steps:
      - uses: actions/checkout@v6
        if: github.event_name != 'schedule'
        with:
          submodules: recursive

      - name: Checkout main branch
        if: github.event_name == 'schedule'
        uses: actions/checkout@v6
        with:
          submodules: recursive
          ref: main

      - name: Mark workspace as safe for git
        run: git config --global --add safe.directory "${GITHUB_WORKSPACE}"

      - name: Configure
        shell: bash
        run: >
          cmake -S . -B build
          -DCMAKE_C_COMPILER=clang
          -DCMAKE_CXX_COMPILER=clang++
          -DCMAKE_CXX_FLAGS="-fsanitize=undefined,address -lc++ -lc++abi -fsanitize-address-use-after-scope -fsanitize-ignorelist=${GITHUB_WORKSPACE}/config/sanitizers/asan_suppression.txt -fsanitize-ignorelist=${GITHUB_WORKSPACE}/config/sanitizers/asan_ignorelist.txt -Wno-reserved-macro-identifier -Wno-unused-command-line-argument -fno-omit-frame-pointer -g -O1"
          -DBUILD_TESTING=ON
          -DHELICS_BUILD_TESTS=ON
          -DHELICS_ZMQ_SUBPROJECT=ON
          -DHELICS_ZMQ_FORCE_SUBPROJECT=ON
          -DHELICS_USE_ZMQ_STATIC_LIBRARY=ON
          -DHELICS_ENABLE_EXTRA_COMPILER_WARNINGS=OFF

      - name: Build
        shell: bash
        run: cmake --build build --parallel 4

      - name: Run ASan tests
        shell: bash
        run: >
          LSAN_OPTIONS="suppressions=${GITHUB_WORKSPACE}/config/sanitizers/leak_suppression.txt"
          UBSAN_OPTIONS="print_stacktrace=1:suppressions=${GITHUB_WORKSPACE}/config/sanitizers/ubsan_suppression.txt"
          bash scripts/run-sanitizer-tests.sh
